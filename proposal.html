<html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Question 💖</title>
<style>
body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Comic Sans MS', cursive;
    background: linear-gradient(135deg,#ffd6e7,#ffc0cb);
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    color:#ff2f7a;
    font-size:2.5rem;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:25px;
    margin:10px;
    cursor:pointer;
    transition:0.3s;
}

#yesBtn{
    background:#ff4d88;
    color:white;
}

#noBtn{
    background:white;
    color:#ff4d88;
    position:absolute;
}

.hearts{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
}

.heart{
    position:absolute;
    color:#ff4d88;
    animation: float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}

.congrats{
    display:none;
    text-align:center;
    color:#ff2f7a;
}

.bear{
    font-size:50px;
}
</style>
</head>

<body>

<div class="container" id="question">
<h1>Will you be my girlfriend? 💖</h1>

<div class="bear">🧸💗🧸</div>

<button id="yesBtn" onclick="sayYes()">Yes 💕</button>
<button id="noBtn">No 🙈</button>
</div>

<div class="congrats" id="congrats">
<h1>Congratulations!!! 💖</h1>
<h2>She said YES! 🎉</h2>
<div class="bear">🧸❤️🧸❤️🧸</div>
<p>This is the beginning of something beautiful 💞</p>
</div>

<div class="hearts" id="hearts"></div>

<script>
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

function moveButton(){
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

function sayYes(){
    document.getElementById("question").style.display="none";
    document.getElementById("congrats").style.display="block";
}

function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+10)+"px";
    heart.style.animationDuration=(Math.random()*3+3)+"s";
    document.getElementById("hearts").appendChild(heart);

    setTimeout(()=>{heart.remove();},6000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
